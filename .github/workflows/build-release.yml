name: Build signed release APK

on:
  push:
    branches: [main]
    paths-ignore:
      - "apk/**"
      - "**.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "${{ runner.temp }}/release.p12"
          else
            echo "No keystore secret set — release will fall back to debug signing."
          fi

      - name: Build release APK
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          KEYSTORE_FILE: ${{ runner.temp }}/release.p12
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease

      - name: Verify the APK has NO internet permission (privacy gate)
        run: |
          AAPT=$(ls "$ANDROID_HOME"/build-tools/*/aapt | tail -1)
          PERMS=$("$AAPT" dump permissions app/build/outputs/apk/release/app-release.apk)
          echo "$PERMS"
          if echo "$PERMS" | grep -qE "INTERNET|ACCESS_NETWORK_STATE|ACCESS_WIFI_STATE"; then
            echo "::error::APK contains a network permission — refusing to ship."
            exit 1
          fi
          echo "Confirmed: no network permissions in the APK."

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Messages-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Commit APK into the repository (apk/ folder)
        run: |
          mkdir -p apk
          cp app/build/outputs/apk/release/app-release.apk apk/Messages.apk
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apk/Messages.apk
          git commit -m "ci: release APK build ${{ github.run_number }} [skip ci]" || echo "No changes"
          git push
